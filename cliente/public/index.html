<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        #app{
            
        }
        #registrar{
            width: 400px;
            height: 400px;
            border-radius: 30px;
            background-color: rgb(79, 74, 74);
            position: absolute;
        }
    </style>
</head>
<body>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <div id="app" style="position: relative;">
        <fieldset style="width: 400px;
            height: 400px;
            background-color: black;
            border-radius: 40px; margin: 0 auto; position: absolute;">
            <h1 style="color: aliceblue; text-align: center;">Login</h1>
            <div class="mb-3">
            <label for="disabledTextInput" class="form-label">Correo</label>
             <input type="email" v-model="email" placeholder="Correo" class="form-control"/>
            </div>
            <div class="mb-3">
            <label for="disabledSelect" class="form-label">Password</label>
            <input type="password" v-model="password" placeholder="password" class="form-control"/>
            </div>
            <div class="mb-3">
            </div>
            <div style="display: flex; justify-content: center;">
                <button @click="login" class="btn btn-dark">logiarse</button>
                <button @click="aparecerRegistrarAlumno" class="btn btn-dark">Registrarse</button>
                <button @click="prueba" class="btn btn-dark" style="display: flex; justify-content: center;">prueba</button>
            </div>
        </fieldset>


       <!--aqui esta el div que se oculta-->
        <div id="registrar" >
            <div class="input-group mb-3">
                <span class="input-group-text" id="inputGroup-sizing-default">Correo</span>
                <input type="text" class="form-control" v-model="correo_registro" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text" id="inputGroup-sizing-default">password</span>
                <input type="password" class="form-control" v-model="password_registro" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text" id="inputGroup-sizing-default">Password de confirmacion</span>
                <input type="password" class="form-control" v-model="password_confirmacion_registro" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text" id="inputGroup-sizing-default">Username</span>
                <input type="text" class="form-control" v-model="username" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text" id="inputGroup-sizing-default">Fecha de nacimiento</span>
                <input type="date" class="form-control" v-model="fecha_ncimiento" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
            </div>
            
            <div>Seleccionar un género: {{ genero }}</div>
            <select v-model="genero">
                <option disabled value="">Seleccionar género</option>
                <option value="f">Femenino</option>
                <option value="m">Masculino</option>
            </select>
           
            <button @click="registrarUsuario" class="btn btn-dark" style="display: flex; justify-content: center;">registrar usuario</button>
        </div>
        

    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
	<script src="api.js"></script>
    <script>
        const { createApp, ref } = Vue

        createApp({
           data(){
                return{
                    email: '',
                    password: '',
                    correo_registro: '',
                    password_registro:'',
                    password_confirmacion_registro:'',
                    username:'',
                    fecha_ncimiento:'',
                    opcionSeleccionada:'',
                    genero:''
                }
           },
           methods: {
                login(){
                    // Init vars
                    let data = {
                        correo: this.email,
                        password:this.password
                    }

                    api({
                        ...data,
                        url: 'login',
                        type: 'POST'
                    }).then((resp) => {
                        // If all ok, get user data from API and save in local
                        console.log(resp)
                        if(resp.data.message){
                            localStorage.setItem("token", resp.data.usuario.token);
                            window.location.href = "/inicio";
                        }else{
                            alert("error no se pudo logiar")

                        }
                        
                    }).catch((error) => {
                        alert("error")
                        
                    })
                    
                },
                registrarUsuario(){
                    
                    if(this.password_registro===this.password_confirmacion_registro){
                        // Init vars
                        
                        let data = {
                            correo: this.correo_registro,
                            password: this.password_registro,
                            username: this.username,
                            genero: this.genero
                        }
                        console.log(data);
                        
                        api({
                            ...data,
                            url: 'registrarUsuario',
                            type: 'POST'
                        }).then((resp) => {
                            // If all ok, get user data from API and save in local
                            if (resp.data) {
                                console.log(resp)
                                alert(resp.data)
                                
                            }
                        }).catch((error) => {
                            console.log(error);
                        })
                        
                    }else{
                        alert("el password no es igual vuelva  escribirlo");
                        this.password_confirmacion_registro='';
                        this.password_registro='';
                    }
                },
                aparecerRegistrarAlumno(){
                    document.getElementById("registrar").style.display="block";
                },
                prueba(){
                    fetch("http://localhost:8000/api/prueba", {method:"GET",  
                        headers: {
                            "Content-Type": "application/json"
                        }})
                        .then(response => response.json())
                        .then(data => {
                            console.log(data);
                        });
                }
           }
        }).mount('#app')

        document.getElementById("registrar").style.display="none";
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
