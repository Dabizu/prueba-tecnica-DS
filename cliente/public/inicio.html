<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <div id="app">
        <div id="listar">
            <h2>Lista de usuarios</h2>
            <table class="table-warning">
                <thead>
                    <tr>
                        <th scope="col">id</th>
                        <th scope="col">correo</th>
                        <th scope="col">genero</th>
                        <th scope="col">usernaame</th>
                    </tr>
                </thead>
                <tbody v-for="(usuario, index) in usuarios" :key="index">
                    <tr>
                        <th scope="row">{{usuario.id}}</th>
                        <td>{{usuario.correo}}</td>
                        <td>{{usuario.genero==="m"?"masculino":"femenino"}}</td>
                        <td>{{usuario.username}}</td>
                        <td>
                            <button type="button" class="btn btn-danger" @click="eliminar(usuario.id)">Eliminar</button>
                        </td>
                        <td>
                            <button type="button" class="btn btn-primary" @click="abrirModificacion(usuario.id,usuario.correo,usuario.genero,usuario.username)">modificar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div id="modificar">
            <h1>Escriba el que guste modificar</h1>
            <div class="input-group mb-3">
                <span class="input-group-text" id="inputGroup-sizing-default">Correo</span>
                <input type="text" class="form-control" v-model="correo" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text" id="inputGroup-sizing-default">genero</span>
                <input type="text" class="form-control" v-model="genero" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text" id="inputGroup-sizing-default">username</span>
                <input type="text" class="form-control" v-model="username" aria-label="Sizing example input" aria-describedby="inputGroup-sizing-default">
            </div>
             <button type="button" class="btn btn-primary" @click="actualizar">Actualizar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="api.js"></script>
    <script>
        const { createApp, ref } = Vue
        createApp({
            data() {
                return {
                    username: '',
                    correo: '',
                    genero: '',
                    usuarios: []
                }
            },
            mounted() {
                fetch("http://localhost:8000/api/prueba", {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json"
                    }
                })
                    .then(response => response.json())
                    .then(data => {
                        console.log(data);
                        this.usuarios = data;

                    });
            },
            methods: {
                eliminar(id) {

                    let data = {
                        id: id
                    }
                    console.log(data);

                    api({
                        ...data,
                        url: 'eliminarUsuario',
                        type: 'DELETE'
                    }).then((resp) => {
                        // If all ok, get user data from API and save in local
                        if (resp.data) {
                            console.log(resp)
                            fetch("http://localhost:8000/api/prueba", {
                                method: "GET",
                                headers: {
                                    "Content-Type": "application/json"
                                }
                            })
                                .then(response => response.json())
                                .then(data => {
                                    console.log(data);
                                    this.usuarios = data;

                                });

                        }
                    }).catch((error) => {
                        console.log(error);
                    })


                },
                actualizar(){
                    let data = {
                        id:this.id,
                        correo:this.correo,
                        genero:this.genero,
                        username:this.username
                    }
                    console.log(data);

                    api({
                        ...data,
                        url: 'modificarUsuario',
                        type: 'POST'
                    }).then((resp) => {
                        fetch("http://localhost:8000/api/prueba", {
                                method: "GET",
                                headers: {
                                    "Content-Type": "application/json"
                                }
                            })
                                .then(response => response.json())
                                .then(data => {
                                    console.log(data);
                                    this.usuarios = data;
                                    document.getElementById("modificar").style.display="none";

                                });
                    }).catch((error) => {
                        console.log(error);
                    })
                },
                abrirModificacion(id,correo,genero,username){
                    this.id=id;
                    this.correo=correo;
                    this.genero=genero;
                    this.username=username;
                    document.getElementById("modificar").style.display="block";
                }

            }
        }).mount('#app')
        document.getElementById("modificar").style.display="none";
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
